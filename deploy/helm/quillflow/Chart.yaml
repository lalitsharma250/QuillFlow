# Chart metadata — describes this Helm chart
apiVersion: v2
name: quillflow
description: Production-grade Agentic RAG content generation system
type: application
version: 0.1.0        # Chart version (deployment config version)
appVersion: "0.1.0"   # Application version (your code version)

# Dependencies — other charts this chart needs
# Qdrant and Redis can be installed as sub-charts
dependencies:
  - name: redis
    version: "18.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: postgresql
    version: "13.x.x"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
