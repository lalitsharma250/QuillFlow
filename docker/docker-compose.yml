version: "3.8"

services:
  # ── Infrastructure ─────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quillflow-postgres
    environment:
      POSTGRES_USER: quillflow
      POSTGRES_PASSWORD: ${QUILL_POSTGRES_PASSWORD:-quillflow_dev}
      POSTGRES_DB: quillflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quillflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - quillflow-net

  redis:
    image: redis:7-alpine
    container_name: quillflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - quillflow-net

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: quillflow-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - quillflow-net

  # ── Application ────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quillflow-api
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app
      QUILL_POSTGRES_HOST: postgres
      QUILL_POSTGRES_PORT: "5432"
      QUILL_REDIS_URL: redis://redis:6379/0
      QUILL_QDRANT_HOST: qdrant
      QUILL_QDRANT_PORT: "6333"
      QUILL_QDRANT_GRPC_PORT: "6334"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 300s
    restart: unless-stopped
    networks:
      - quillflow-net

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    container_name: quillflow-worker
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app
      QUILL_POSTGRES_HOST: postgres
      QUILL_POSTGRES_PORT: "5432"
      QUILL_REDIS_URL: redis://redis:6379/0
      QUILL_QDRANT_HOST: qdrant
      QUILL_QDRANT_PORT: "6333"
      QUILL_QDRANT_GRPC_PORT: "6334"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quillflow-net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: quillflow-frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - quillflow-net

  # ── Database Migration (run once) ──────────────────
  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: quillflow-migrate
    command: ["sh", "-c", "cd /app && PYTHONPATH=/app alembic upgrade head"]
    env_file:
      - ../.env
    environment:
      QUILL_POSTGRES_HOST: postgres
      QUILL_POSTGRES_PORT: "5432"
      QUILL_REDIS_URL: redis://redis:6379/0
      QUILL_QDRANT_HOST: qdrant
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks:
      - quillflow-net

volumes:
  postgres_data:
  redis_data:
  qdrant_data:

networks:
  quillflow-net:
    driver: bridge