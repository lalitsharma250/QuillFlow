# ══════════════════════════════════════════════════════════
# QuillFlow Helm Chart — Default Values
# ══════════════════════════════════════════════════════════

# ── API Deployment ─────────────────────────────────────
api:
  replicaCount: 2              # Run 2 API pods for high availability
  image:
    repository: ghcr.io/your-org/quillflow
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "500m"              # 0.5 CPU cores guaranteed
      memory: "1Gi"            # 1 GB RAM guaranteed
    limits:
      cpu: "2000m"             # Max 2 CPU cores
      memory: "4Gi"            # Max 4 GB RAM
  port: 8000
  env:
    QUILL_DEBUG: "false"
    QUILL_LOG_LEVEL: "INFO"

# ── Worker Deployment ──────────────────────────────────
worker:
  replicaCount: 1
  image:
    repository: ghcr.io/your-org/quillflow-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: "1000m"             # Workers are CPU-heavy (embedding)
      memory: "4Gi"            # Embedding model needs ~3GB
    limits:
      cpu: "4000m"
      memory: "8Gi"

# ── Qdrant StatefulSet ─────────────────────────────────
qdrant:
  replicaCount: 1
  image:
    repository: qdrant/qdrant
    tag: "v1.12.4"
  storage:
    size: 20Gi                 # Persistent volume size
    storageClass: "standard"   # Cloud provider storage class
  resources:
    requests:
      cpu: "500m"
      memory: "2Gi"
    limits:
      cpu: "2000m"
      memory: "4Gi"
  ports:
    rest: 6333
    grpc: 6334

# ── Auto-scaling ───────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70     # Scale up when CPU > 70%
  targetMemoryUtilization: 80

# ── Ingress ────────────────────────────────────────────
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
  hosts:
    - host: api.quillflow.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: quillflow-tls
      hosts:
        - api.quillflow.example.com

# ── External dependencies ──────────────────────────────
redis:
  enabled: true                # Install Redis as sub-chart
  auth:
    enabled: false             # Simplify for now (use network policies instead)
  master:
    persistence:
      size: 5Gi

postgresql:
  enabled: true
  auth:
    username: quillflow
    password: ""               # Set via --set or secrets
    database: quillflow
  primary:
    persistence:
      size: 20Gi
